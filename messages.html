<script type="module">
  import { getMessages, saveMessages, getQueryParam } from './shared.js';

  // State
  let threads = getMessages();
  let activeThreadId = getQueryParam("threadId") || (threads[0] ? threads[0].threadId : null);

  // DOM Elements
  const chatList = document.getElementById("chat-list");
  const messageThread = document.getElementById("message-thread");
  const activeChatAvatar = document.getElementById("active-chat-avatar");
  const activeChatName = document.getElementById("active-chat-name");
  const activeChatStatus = document.getElementById("active-chat-status");
  const chatInput = document.getElementById("chat-input");
  const btnSend = document.getElementById("btn-send");
  const typingIndicator = document.getElementById("typing-indicator");
  const typingAvatar = document.getElementById("typing-avatar");

  function renderChatList() {
    chatList.innerHTML = threads.map(thread => {
      const isActive = thread.threadId === activeThreadId;
      const bgClass = isActive ? "bg-primary-container/10 border-l-4 border-primary" : "border-l-4 border-transparent hover:bg-surface-container-low";
      const onlineTag = thread.online ? '<div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-secondary border-2 border-surface rounded-full"></div>' : '';
      const avatarSrc = thread.senderAvatar || 'https://via.placeholder.com/48';
      const lastMsg = thread.messages[thread.messages.length - 1];
      const lastMsgText = lastMsg ? lastMsg.text : 'No messages yet';
      const lastMsgTime = lastMsg ? lastMsg.time : '';
      
      const avatarMarkup = thread.senderAvatar 
        ? `<img alt="Avatar" class="w-full h-full object-cover" src="${avatarSrc}"/>`
        : `<div class="w-full h-full flex items-center justify-center bg-surface-container-high text-on-surface-variant font-headline-md text-headline-md">${thread.senderName.split(' ').map(n => n[0]).join('')}</div>`;

      return `
        <div onclick="switchThread('${thread.threadId}')" class="flex items-center gap-md p-md cursor-pointer transition-colors ${bgClass}">
          <div class="relative flex-shrink-0">
            <div class="w-12 h-12 rounded-full overflow-hidden border border-outline-variant/20 shadow-sm flex items-center justify-center">
              ${avatarMarkup}
            </div>
            ${onlineTag}
          </div>
          <div class="flex-grow overflow-hidden">
            <div class="flex justify-between items-baseline mb-xs">
              <h3 class="font-label-md text-label-md ${isActive ? 'font-semibold' : 'font-medium'} text-on-surface truncate">${thread.senderName}</h3>
              <span class="font-label-sm text-label-sm ${isActive ? 'text-primary' : 'text-outline'}">${lastMsgTime}</span>
            </div>
            <p class="font-body-md text-body-md text-on-surface-variant truncate text-sm">${lastMsgText}</p>
          </div>
        </div>
      `;
    }).join("");
  }

  window.switchThread = function(threadId) {
    activeThreadId = threadId;
    renderChatList();
    renderActiveChat();
  };

  function renderActiveChat() {
    const thread = threads.find(t => t.threadId === activeThreadId);
    if (!thread) return;

    // Header Info
    activeChatName.innerText = thread.senderName;
    activeChatStatus.innerHTML = thread.online 
      ? '<span class="text-secondary">Online</span>'
      : `<span class="text-outline">Offline • Last active ${thread.lastActive}</span>`;
    
    if (thread.senderAvatar) {
      activeChatAvatar.src = thread.senderAvatar;
      activeChatAvatar.style.display = "block";
      activeChatAvatar.nextElementSibling.style.display = "none";
      if (typingAvatar) typingAvatar.src = thread.senderAvatar;
    } else {
      activeChatAvatar.style.display = "none";
      const initDiv = activeChatAvatar.nextElementSibling;
      initDiv.innerText = thread.senderName.split(' ').map(n => n[0]).join('');
      initDiv.style.display = "flex";
      if (typingAvatar) typingAvatar.style.display = "none";
    }

    // Messages Thread
    let messagesHTML = "";

    // Render Product Context Card if available
    if (thread.productContext) {
      messagesHTML += `
        <div class="flex self-start mb-2 max-w-[80%]">
          <div class="bg-white rounded-2xl rounded-tl-sm p-3 shadow-sm border border-outline-variant/10 flex gap-4 w-full">
            <div class="w-20 h-20 rounded-lg overflow-hidden flex-shrink-0">
              <img alt="Product" class="w-full h-full object-cover" src="${thread.productContext.image || 'https://via.placeholder.com/80'}"/>
            </div>
            <div class="flex flex-col justify-center">
              <span class="font-label-sm text-label-sm text-primary mb-1 uppercase tracking-wider">Inquiry Context</span>
              <h4 class="font-label-md text-label-md font-semibold text-on-surface line-clamp-1">${thread.productContext.title}</h4>
              <p class="font-body-md text-body-md font-medium text-on-surface-variant mt-1">${thread.productContext.price}</p>
            </div>
          </div>
        </div>
      `;
    }

    // Render each message
    thread.messages.forEach(msg => {
      const isMe = msg.sender === "me";
      if (isMe) {
        messagesHTML += `
          <div class="flex items-end gap-2 self-end max-w-[75%] mt-sm">
            <div class="bg-primary px-4 py-3 rounded-2xl rounded-br-sm shadow-sm">
              <p class="font-body-md text-body-md text-on-primary">${msg.text}</p>
            </div>
          </div>
        `;
      } else {
        const avatarSrc = thread.senderAvatar || 'https://via.placeholder.com/32';
        const avatarMarkup = thread.senderAvatar
          ? `<img alt="Avatar" class="w-full h-full object-cover" src="${avatarSrc}"/>`
          : `<div class="w-full h-full flex items-center justify-center bg-surface-container-high text-on-surface-variant font-bold text-xs">${thread.senderName.split(' ').map(n => n[0]).join('')}</div>`;

        messagesHTML += `
          <div class="flex items-end gap-2 self-start max-w-[75%] mt-sm">
            <div class="w-8 h-8 rounded-full overflow-hidden flex-shrink-0 mb-1 shadow-sm flex items-center justify-center border border-outline-variant/10">
              ${avatarMarkup}
            </div>
            <div class="bg-white px-4 py-3 rounded-2xl rounded-bl-sm shadow-sm border border-outline-variant/10">
              <p class="font-body-md text-body-md text-on-surface">${msg.text}</p>
            </div>
          </div>
        `;
      }
    });

    messageThread.innerHTML = messagesHTML;
    // Scroll to bottom
    messageThread.scrollTop = messageThread.scrollHeight;
  }

  // Handle Send Message
  function sendMessage() {
    const text = chatInput.value.trim();
    if (!text) return;

    const thread = threads.find(t => t.threadId === activeThreadId);
    if (!thread) return;

    const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    
    // Add mine
    thread.messages.push({
      sender: "me",
      text: text,
      time: timeString
    });

    chatInput.value = "";
    saveMessages(threads);
    renderActiveChat();
    renderChatList();

    // Simulate response
    showTypingIndicator();
    
    setTimeout(() => {
      hideTypingIndicator();
      const replies = [
        "Yeah, sounds perfect! See you then.",
        "Awesome! I will check the fit and let you know.",
        "Does 4:00 PM work for you instead?",
        "Sounds good, I'll bring the charger too.",
        "Perfect, thanks! See you on campus."
      ];
      const replyText = replies[Math.floor(Math.random() * replies.length)];
      
      thread.messages.push({
        sender: "them",
        text: replyText,
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      });
      
      saveMessages(threads);
      renderActiveChat();
      renderChatList();
    }, 1500);
  }

  function showTypingIndicator() {
    typingIndicator.style.display = "flex";
    messageThread.scrollTop = messageThread.scrollHeight;
  }

  function hideTypingIndicator() {
    typingIndicator.style.display = "none";
  }

  btnSend.onclick = sendMessage;
  chatInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Initial
  renderChatList();
  renderActiveChat();
  hideTypingIndicator();
</script>
